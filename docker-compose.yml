services:
  mysql:
    image: mysql:8.4
    container_name: fs-mysql
    restart: unless-stopped
    # 3307 on the host: the system MariaDB occupies 3306
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: fs_root_dev
      MYSQL_DATABASE: fs_internal_system
      MYSQL_USER: fs_app
      MYSQL_PASSWORD: fs_app_dev
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pfs_root_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql-data:
